name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0

      - name: Install StyLua
        run: cargo install stylua --version "^2"

      - name: Check Lua formatting
        run: stylua --check .

      - name: Install Selene
        run: cargo install selene --version "^0.28"

      - name: Lint Lua
        run: selene .

      - name: Install Neovim
        run: |
          gh release download --repo "neovim/neovim" --pattern "nvim-linux64.tar.gz" --latest
          tar xzf nvim-linux64.tar.gz
          echo "$PWD/nvim-linux64/bin" >> $GITHUB_PATH

      - name: Validate config loads
        run: nvim --headless -c "qall"
