name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NEOVIM_VERSION: "0.12.4"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Format check & lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0

      - name: Install StyLua
        run: cargo install stylua --version "^2"

      - name: Check Lua formatting
        run: stylua --check .

      - name: Install Selene
        run: cargo install selene --version "^0.28"

      - name: Lint Lua
        run: selene .

  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Neovim
        run: |
          curl -LO https://github.com/neovim/neovim/releases/download/v${{ env.NEOVIM_VERSION }}/nvim-linux-x86_64.tar.gz
          sudo rm -rf /opt/nvim
          sudo tar -C /opt -xzf nvim-linux-x86_64.tar.gz
          echo "/opt/nvim-linux-x86_64/bin" >> "$GITHUB_PATH"

      - name: Verify installation
        run: nvim --version

      - name: Validate config loads
        run: nvim --headless -c "qall"
